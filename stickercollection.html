            <img

            />
            <button

            <img

            <button
              class="p2-sticker-trigger p2-sticker-trigger--sleepy"
              type="button"

              data-sticker-reason="You earned this sticker by collecting late-night drink moments in your journal."
              aria-label="View why you earned the Sleepy Sipper sticker"
            ></button>
            <div class="p2-grid-box p2-grid-box-a"></div>
            <div class="p2-grid-box p2-grid-box-b"></div>
            <div class="p2-grid-box p2-grid-box-c"></div>
            <div class="p2-grid-box p2-grid-box-d"></div>
            <div class="p2-grid-box p2-grid-box-e"></div>
            <div class="p2-grid-box p2-grid-box-f"></div>

            <div class="p2-menu-bar"></div>
            <!-- Nav assets: same as homepage -->

              class="p2-nav-figma p2-nav-figma--home-outline"
              src="https://www.figma.com/api/mcp/asset/fdce71a9-de3a-409b-a5e1-1d2861e65736"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--home-door"
              src="https://www.figma.com/api/mcp/asset/0af53790-ceb4-49cf-a253-40317e5dcae6"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--sticker"
              src="https://www.figma.com/api/mcp/asset/8cfb0de2-3fad-46c4-b49e-5455b02a03d8"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--sip-cup"
              src="https://www.figma.com/api/mcp/asset/4400277d-d0f2-493b-9293-8413c256a862"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--sip-handle"
              src="https://www.figma.com/api/mcp/asset/9143d1b8-5b61-486e-8510-8a57ed2e694c"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--sip-steam p2-nav-figma--sip-steam-l"

              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--sip-steam p2-nav-figma--sip-steam-c"
              src="https://www.figma.com/api/mcp/asset/c3f87d79-9f67-4d92-b814-0ff15a05ee62"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--sip-steam p2-nav-figma--sip-steam-r"
              src="https://www.figma.com/api/mcp/asset/c3f87d79-9f67-4d92-b814-0ff15a05ee62"
              alt=""
              aria-hidden="true"
            />
            <img
              class="p2-nav-figma p2-nav-figma--profile"
              src="https://www.figma.com/api/mcp/asset/133a126c-de51-4923-ac69-f36c962c95bc"
              alt=""
              aria-hidden="true"
            />
            <a
              class="p2-home-hit"
              href="./index.html"
              aria-label="Go to home"
              onclick="sessionStorage.setItem('drinkindexSkipSplashOnce','true')"
            ></a>
            <a class="p2-star-hit" href="./stickercollection.html" aria-current="page" aria-label="Current page: sticker collection"></a>
            <a

            <section class="p2-star-picker" id="p2-star-picker" hidden aria-label="Choose your star">

                <button class="p2-star-choice p2-star-choice--blue" type="button" data-star-src="https://www.figma.com/api/mcp/asset/6f52baf3-a4e9-47bd-832b-785e995b8a10" aria-label="Choose blue star">
                  <img src="https://www.figma.com/api/mcp/asset/6f52baf3-a4e9-47bd-832b-785e995b8a10" alt="" />
                </button>
                <button class="p2-star-choice p2-star-choice--green" type="button" data-star-src="https://www.figma.com/api/mcp/asset/1588933c-89db-4b9d-89d9-7209737dd538" aria-label="Choose green star">
                  <img src="https://www.figma.com/api/mcp/asset/1588933c-89db-4b9d-89d9-7209737dd538" alt="" />
                </button>
                <button class="p2-star-choice p2-star-choice--orange" type="button" data-star-src="https://www.figma.com/api/mcp/asset/d6cfd53e-2aeb-4ee7-afe9-63a2908f6eb2" aria-label="Choose orange star">
                  <img src="https://www.figma.com/api/mcp/asset/d6cfd53e-2aeb-4ee7-afe9-63a2908f6eb2" alt="" />
                </button>
                <button class="p2-star-choice p2-star-choice--purple" type="button" data-star-src="https://www.figma.com/api/mcp/asset/8c93703b-18ce-481b-95a3-8176b279d9d8" aria-label="Choose purple star">
                  <img src="https://www.figma.com/api/mcp/asset/8c93703b-18ce-481b-95a3-8176b279d9d8" alt="" />
                </button>
                <button class="p2-star-choice p2-star-choice--rainbow" type="button" data-star-src="https://www.figma.com/api/mcp/asset/b2efc12b-aea4-4771-8650-b69ccdcce1fa" aria-label="Choose rainbow star">
                  <img src="https://www.figma.com/api/mcp/asset/b2efc12b-aea4-4771-8650-b69ccdcce1fa" alt="" />
                </button>
              </div>
            </section>
            <section class="p2-sticker-modal" id="p2-sticker-modal" hidden role="dialog" aria-modal="true" aria-labelledby="p2-sticker-modal-title">
              <div class="p2-sticker-modal-card">
                <h3 class="p2-sticker-modal-title" id="p2-sticker-modal-title">Sticker</h3>
                <p class="p2-sticker-modal-copy" id="p2-sticker-modal-copy">You earned this sticker!</p>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const greeting = document.getElementById("p2-greeting");
        const editTrigger = document.getElementById("p2-card-edit-trigger");
        const picker = document.getElementById("p2-star-picker");
        const cardStar = document.getElementById("p2-card-star");
        const stickerModal = document.getElementById("p2-sticker-modal");
        const stickerModalTitle = document.getElementById("p2-sticker-modal-title");
        const stickerModalCopy = document.getElementById("p2-sticker-modal-copy");
        const stickerTriggers = Array.from(document.querySelectorAll(".p2-sticker-trigger"));
        const page = document.querySelector(".page2-screen");
        if (!greeting || !editTrigger || !picker || !cardStar || !stickerModal || !stickerModalTitle || !stickerModalCopy || !page || !stickerTriggers.length) return;

        const hour = new Date().getHours();
        if (hour < 12) {
          greeting.textContent = "Good Morning";
        } else if (hour < 18) {
          greeting.textContent = "Good Afternoon";
        } else {
          greeting.textContent = "Good Evening";
        }

        function openPicker() {
          picker.hidden = false;
        }

        function closePicker() {
          picker.hidden = true;
        }

        function openStickerModal(title, reason) {
          stickerModalTitle.textContent = title || "Sticker";
          stickerModalCopy.textContent = reason || "You earned this sticker!";
          stickerModal.hidden = false;
          page.classList.add("is-sticker-modal-open");
        }

        function closeStickerModal() {
          stickerModal.hidden = true;
          page.classList.remove("is-sticker-modal-open");
        }

        editTrigger.addEventListener("click", openPicker);
        picker.addEventListener("click", function (event) {
          if (event.target === picker) closePicker();
        });

        picker.querySelectorAll("[data-star-src]").forEach(function (option) {
          option.addEventListener("click", function () {
            const nextSrc = option.getAttribute("data-star-src");
            if (nextSrc) cardStar.setAttribute("src", nextSrc);
            closePicker();
          });
        });

        stickerTriggers.forEach(function (trigger) {
          trigger.addEventListener("click", function () {
            openStickerModal(trigger.getAttribute("data-sticker-title"), trigger.getAttribute("data-sticker-reason"));
          });
        });

        stickerModal.addEventListener("click", function (event) {
          if (event.target === stickerModal) closeStickerModal();
        });
      })();
    </script>
  </body>
</html>
