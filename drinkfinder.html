        function splitTwoLines(value) {
          const text = (value || "").trim();
          if (!text) return ["Wild Love", "Bakehouse"];
          if (/^scooter'?s\s+coffee$/i.test(text)) return ["Scooter's Coffee", ""];
          if (/^fable\s+hollow$/i.test(text)) return ["Fable Hollow", ""];
          if (/^fable\s+hollow\s+coffee\s*(?:&|and)\s*bookshoppe$/i.test(text)) {
            return ["Fable Hollow", "Coffee & Bookshoppe"];
          }
          const words = text.split(/\s+/);
          if (words.length === 1) return [text, ""];
          const midpoint = Math.ceil(words.length / 2);
          return [words.slice(0, midpoint).join(" "), words.slice(midpoint).join(" ")];
        }

        function formatPlaceNameForCard(name) {
          const raw = String(name || "").trim();
          if (!raw) return raw;
          if (/^mia\s+piccola/i.test(raw)) return "Mia Piccola";
          if (/^mia\s+piccola\s*-\s*north\s+knoxville$/i.test(raw)) return "Mia Piccola";
          if (/^mahalo\s+coffee\s+roasters$/i.test(raw)) return "Mahalo";
          if (/^fable\s+hollow\s+coffee\s*(?:&|and)\s*bookshoppe$/i.test(raw)) return "Fable Hollow";
          if (/^velocity\s+coffee\s*(?:&|and)\s*roasters$/i.test(raw)) return "Velocity";
          if (/^coffee\s*(?:&|and)\s*chocolate(?:\s+powell)?$/i.test(raw)) return "Coffee & Chocolate";
          if (/^just\s+love\s+coffee\s+cafe(?:\s*-\s*knoxville)?$/i.test(raw)) return "Just Love Coffee";
          if (/^intrepid\s+nitro\s+coffee\s+and\s+tea\s+bar$/i.test(raw)) return "Intrepid Nitro";
          if (/^komma\s+tea\s*-\s*west\s+town\s+mall$/i.test(raw)) return "Komma Tea";
          if (/^kyuramen\s*x\s*tbaar\s*-\s*knoxville$/i.test(raw)) return "Kyuramen x TBaar";
          if (/^hey\s+bear\s+cafe\s+at\s+kern'?s\s+food\s+hall$/i.test(raw)) return "Hey Bear Cafe";
          return raw.replace(/\s*-\s*(north|south|central)\s+knoxville$/i, "").trim();
        }

        function setTwoLineText(node, value) {
          if (!node) return;
          const lines = splitTwoLines(value);
          node.textContent = "";
          node.appendChild(document.createTextNode(lines[0] || ""));
          if (lines[1]) {
            node.appendChild(document.createElement("br"));
            node.appendChild(document.createTextNode(lines[1]));
          }
        }

        function normalizePlaceName(name) {
          return String(name || "")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, " ")
            .trim();
        }

        function isBlockedPlaceName(name) {
          const normalized = normalizePlaceName(name);
          return /cobra\s*energy\s*drink/.test(normalized) ||
            /las\s*vegas\s*power/.test(normalized) ||
            /b2\s*energy\s*drink/.test(normalized) ||
            /b52(?:\s*energy\s*drink)?/.test(normalized) ||
            /hell\s*energy\s*drink/.test(normalized);
        }

        function filterBlockedPlaceNames(names) {
          return (Array.isArray(names) ? names : []).filter(function (name) {
            return !isBlockedPlaceName(name);
          });

        async function fetchGooglePlaceLocation(name, apiKey) {
          const textQuery = String(name || "").trim();
          if (!textQuery || !apiKey) return null;
          const requestBody = {
            textQuery: textQuery + ", Knoxville TN",
            maxResultCount: 1
          };
          const response = await fetch("https://places.googleapis.com/v1/places:searchText", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Goog-Api-Key": apiKey,
              "X-Goog-FieldMask": "places.formattedAddress,places.location"
            },
            body: JSON.stringify(requestBody)
          });
          if (!response.ok) return null;
          const data = await response.json();
          const place = Array.isArray(data.places) ? data.places[0] : null;
          if (!place) return null;
          return {
            address: place.formattedAddress || null,
            latitude: place.location && typeof place.location.latitude === "number" ? place.location.latitude : null,
            longitude: place.location && typeof place.location.longitude === "number" ? place.location.longitude : null
          };
        }

        async function fetchFallbackLocation(name) {
          const textQuery = String(name || "").trim();
          if (!textQuery) return null;
          const url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=" + encodeURIComponent(textQuery + ", Knoxville TN");
          const response = await fetch(url);
          if (!response.ok) return null;
          const data = await response.json();
          const match = Array.isArray(data) ? data[0] : null;
          if (!match) return null;
          const lat = Number(match.lat);
          const lon = Number(match.lon);
          return {
            address: match.display_name || null,
            latitude: Number.isFinite(lat) ? lat : null,
            longitude: Number.isFinite(lon) ? lon : null
          };
        }

        function buildGoogleMapsUrl(name, locationResult) {
          if (locationResult && Number.isFinite(locationResult.latitude) && Number.isFinite(locationResult.longitude)) {
            return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(locationResult.latitude + "," + locationResult.longitude);
          }
          return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(String(name || "coffee shop Knoxville TN"));
        }

        function toShortLocationLabel(address, fallbackArea) {
          const raw = String(address || "").trim();
          if (!raw) return "Located in: " + fallbackArea;
          const parts = raw.split(",").map(function (part) { return part.trim(); }).filter(Boolean);
          if (!parts.length) return "Located in: " + fallbackArea;
          if (parts.length === 1) {
            if (/^\d/.test(parts[0])) return "Located in: " + fallbackArea;
            return "Located in: " + parts[0];
          }
          const cleaned = parts.filter(function (part) {
            if (!part) return false;
            if (/^\d/.test(part)) return false;
            if (/^\d{5}(?:-\d{4})?$/.test(part)) return false;
            if (/\d/.test(part)) return false;
            if (/^(tn|tenn|tennessee)$/i.test(part)) return false;
            if (/^(tn|tenn|tennessee)\s+\d+/i.test(part)) return false;
            if (/^tennessee$/i.test(part)) return false;
            return true;
          });
          if (!cleaned.length) return "Located in: " + fallbackArea;
          const cityLike = cleaned[cleaned.length - 1];
          const neighborhood = cleaned.length > 1 ? cleaned[cleaned.length - 2] : null;
          if (!cityLike || /^\d/.test(cityLike)) return "Located in: " + fallbackArea;
          if (neighborhood && neighborhood !== cityLike && !/knoxville/i.test(neighborhood)) {
            return "Located in: " + neighborhood + ", " + cityLike;
          }
          return "Located in: " + cityLike;
        }

        function formatPlaceTitle(name) {
          const raw = String(name || "").trim();
          if (!raw) return "Location";
          if (/^mia\s+picol+l?a(?:\s*-\s*.*)?$/i.test(raw)) return "Mia Piccola";
          if (/^mahalo\s+coffee\s+roasters$/i.test(raw)) return "Mahalo";
          if (/^fable\s+hollow\s+coffee\s*(?:&|and)\s*bookshoppe$/i.test(raw)) return "Fable Hollow";
          return raw;
        }

        function getStoredCoords() {
          const rawCoords = sessionStorage.getItem("drinkindexCoords");
          if (!rawCoords) return null;
          try {
            const parsed = JSON.parse(rawCoords);
            if (parsed && typeof parsed.lat === "number" && typeof parsed.lon === "number") {

          } catch (_error) {

          }
          return null;

        async function fetchGooglePlacePhoto(name, coords, apiKey) {
          const textQuery = String(name || "").trim();
          if (!textQuery) return null;

          const requestBody = {
            textQuery: textQuery,
            maxResultCount: 1
          };

          if (coords && typeof coords.lat === "number" && typeof coords.lon === "number") {
            requestBody.locationBias = {
              circle: {
                center: { latitude: coords.lat, longitude: coords.lon },
                radius: 18000
              }
            };
          }

          const response = await fetch("https://places.googleapis.com/v1/places:searchText", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Goog-Api-Key": apiKey,
              "X-Goog-FieldMask": "places.displayName,places.photos"
            },
            body: JSON.stringify(requestBody)
          });

          if (!response.ok) return null;
          const data = await response.json();
          const place = Array.isArray(data.places) ? data.places[0] : null;
          const photoName = place && Array.isArray(place.photos) && place.photos[0] && place.photos[0].name
            ? place.photos[0].name
            : null;
          if (!photoName) return null;
          return "https://places.googleapis.com/v1/" + photoName + "/media?maxWidthPx=700&key=" + encodeURIComponent(apiKey);
        }

        async function loadGooglePlacePhotoMap(names) {
          const apiKey = getGooglePlacesApiKey();
          if (!apiKey) return null;
          const coords = getStoredCoords();
          const photoMap = {};
          const cacheKey = "drinkindexGooglePlacePhotoCache";
          let cache = {};
          try {
            cache = JSON.parse(sessionStorage.getItem(cacheKey) || "{}") || {};
          } catch (_error) {
            cache = {};
          }

          const uniqueNames = [];
          names.forEach(function (name) {
            const normalized = normalizePlaceName(name);
            if (!normalized || uniqueNames.includes(normalized)) return;
            uniqueNames.push(normalized);
          });

          await Promise.all(uniqueNames.map(async function (normalizedName) {
            const rawName = names.find(function (name) {
              return normalizePlaceName(name) === normalizedName;
            });
            if (!rawName) return;

            if (cache[normalizedName]) {
              photoMap[normalizedName] = cache[normalizedName];
              return;
            }

            try {
              const photoUrl = await fetchGooglePlacePhoto(rawName, coords, apiKey);
              if (!photoUrl) return;
              cache[normalizedName] = photoUrl;
              photoMap[normalizedName] = photoUrl;
            } catch (_error) {
              // Keep fallback image when Google Places photo fetch fails.
            }
          }));

          try {
            sessionStorage.setItem(cacheKey, JSON.stringify(cache));
          } catch (_error) {
            // Ignore storage write failures.
          }

          return photoMap;
        }

            const fromGoogle = photoMap && normalized ? photoMap[normalized] : null;
            photo.src = fromUploaded || fromGoogle || buildPhotoUrl(placeName);
          });

              mug.className = "df-place-mug" + (key === "orange" ? " df-place-mug--orange" : "");
              mug.src = mugMap[key].src;

              mug.style.zIndex = String(displayKeys.length - index);

          });

        function setPlaceLabels(list) {
          const fallback = ["Life House Coffee", "Wild Love Bakehouse", "Hey Bear Cafe", "", ""];
          const targetCount = Math.min(maxVisiblePlaces, Math.max(minVisiblePlaces, list.length));
          const names = [];
          const displayNames = [];
          for (let i = 0; i < targetCount; i += 1) {
            const baseName = list[i] || fallback[i] || "";
            names.push(baseName);
            displayNames.push(formatPlaceNameForCard(baseName));
          }
          currentPlaceNames.length = 0;
          displayNames.forEach(function (name) {
            currentPlaceNames.push(name);
          });
          if (/^life\s+house\s+coffee$/i.test(String(displayNames[0] || "").trim())) {
            namePopular.textContent = "Life House Coffee";
          } else {
            setTwoLineText(namePopular, displayNames[0]);
          }
          const line2 = splitTwoLines(displayNames[1]);
          name2a.textContent = line2[0];
          name2b.textContent = line2[1];
          if (/^hey\s+bear\s+cafe$/i.test(String(displayNames[2] || "").trim())) {
            name3.textContent = "Hey Bear Cafe";
          } else {
            setTwoLineText(name3, displayNames[2]);
          }
          setTwoLineText(location4, displayNames[3]);
          setTwoLineText(location5, displayNames[4]);
          for (let i = 5; i < names.length; i += 1) {
            const row = ensureExtraRow(i);
            setTwoLineText(row.name, displayNames[i]);
          }
          displayNames.forEach(function (name, index) {
            const trigger = getTriggerNode(index);
            if (!trigger) return;
            trigger.setAttribute("aria-label", "Open location details for " + (name || "location"));
          });
          hideUnusedRows(names.length);
          syncBgBottomHeight(names.length);
          setPlacePhotos(names);
          setPlaceMugs(names);
          const requestId = ++latestPhotoRequestId;
          loadGooglePlacePhotoMap(names).then(function (photoMap) {
            if (!photoMap || requestId !== latestPhotoRequestId) return;
            setPlacePhotos(names, photoMap);
          }).catch(function () {
            // Keep fallback photos if Google photo retrieval fails.
          });
        }

        function extractName(item) {
          if (!item) return null;
          const raw = item.name || item.display_name || "";
          const first = raw.split(",")[0].trim();
          if (!first) return null;
          if (isBlockedPlaceName(first)) return null;
          return first;
        }

        async function searchTermNearby(term, coords, options) {
          const opts = options || {};
          const latDelta = typeof opts.latDelta === "number" ? opts.latDelta : 0.06;
          const resultLimit = typeof opts.limit === "number" ? opts.limit : 8;
          const bounded = opts.bounded !== false;
          const lonDelta = 0.06 / Math.max(Math.cos((coords.lat * Math.PI) / 180), 0.2);
          const minLat = coords.lat - latDelta;
          const maxLat = coords.lat + latDelta;
          const minLon = coords.lon - lonDelta;
          const maxLon = coords.lon + lonDelta;
          const url =
            "https://nominatim.openstreetmap.org/search?" +
            "format=jsonv2&limit=" + resultLimit + "&bounded=" + (bounded ? "1" : "0") +
            "&q=" + encodeURIComponent(term) +
            "&viewbox=" + encodeURIComponent(minLon + "," + minLat + "," + maxLon + "," + maxLat);
          const response = await fetch(url);
          if (!response.ok) return [];
          const data = await response.json();
          if (!Array.isArray(data)) return [];
          return data
            .map(function (item) {
              const name = extractName(item);
              if (!name) return null;
              return {
                name: name,
                displayName: (item.display_name || "").toLowerCase(),
                lat: Number(item.lat),
                lon: Number(item.lon),
                queryTerm: term
              };
            })
            .filter(Boolean);
        }

        function distanceKm(aLat, aLon, bLat, bLon) {
          const toRad = function (deg) { return (deg * Math.PI) / 180; };
          const dLat = toRad(bLat - aLat);
          const dLon = toRad(bLon - aLon);
          const lat1 = toRad(aLat);
          const lat2 = toRad(bLat);
          const hav =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.sin(dLon / 2) * Math.sin(dLon / 2) * Math.cos(lat1) * Math.cos(lat2);
          return 6371 * 2 * Math.atan2(Math.sqrt(hav), Math.sqrt(1 - hav));
        }

        function scorePlace(place, selectedKeys, coords) {
          const haystack = (place.name + " " + place.displayName).toLowerCase();
          let score = 0;

          selectedKeys.forEach(function (key) {
            const terms = mugToSearchTerms[key] || [];
            const categoryMatchers = mugCategories[key] || [];
            const preferredMatchers = mugPreferredPlaceNames[key] || [];

            terms.forEach(function (term) {
              const t = term.toLowerCase();
              if (haystack.includes(t)) {
                score += term === place.queryTerm ? 3 : 2;
              }
            });

            categoryMatchers.forEach(function (matcher) {
              if (matcher.test(haystack)) score += 1;
            });

            preferredMatchers.forEach(function (matcher) {
              if (matcher.test(haystack)) score += 8;
            });
          });

          if (Number.isFinite(place.lat) && Number.isFinite(place.lon)) {
            const km = distanceKm(coords.lat, coords.lon, place.lat, place.lon);
            if (km < 1.2) score += 3;
            else if (km < 3) score += 2;
            else if (km < 6) score += 1;
          }

          return score;
        }

        function rotateList(list, offset) {
          if (!Array.isArray(list) || !list.length) return [];
          const size = list.length;
          const shift = ((offset % size) + size) % size;
          if (!shift) return list.slice();
          return list.slice(shift).concat(list.slice(0, shift));
        }

        function rotatePlacesForSelection(names, selectedKeys) {
          if (!Array.isArray(names) || names.length < 2) return Array.isArray(names) ? names.slice() : [];
          const sortedKeys = (selectedKeys || []).slice().sort().join("|") || "default";
          const rotationKey = "drinkindexDrinkFinderRotation:" + sortedKeys;
          let count = 0;
          try {
            count = Number(sessionStorage.getItem(rotationKey) || "0");
            if (!Number.isFinite(count) || count < 0) count = 0;
          } catch (_error) {
            count = 0;
          }
          const rotated = rotateList(names, count);
          try {
            sessionStorage.setItem(rotationKey, String((count + 1) % names.length));
          } catch (_error) {
            // Ignore storage write failures and keep the current order.
          }
          return rotated;
        }

        async function loadDrinkSpecificPlaces(selectedKeys) {
          const rawCoords = sessionStorage.getItem("drinkindexCoords");
          if (!rawCoords) return;
          let coords = null;
          try {
            const parsed = JSON.parse(rawCoords);
            if (parsed && typeof parsed.lat === "number" && typeof parsed.lon === "number") {
              coords = parsed;
            }
          } catch (_error) {
            return;
          }
          if (!coords) return;

          const terms = [];
          selectedKeys.forEach(function (key) {
            const mapped = mugToSearchTerms[key] || [];
            mapped.forEach(function (term) {
              if (!terms.includes(term)) terms.push(term);
            });
          });
          if (!terms.length) return;

          const cacheKey = "drinkindexDrinkFinderCache";
          const cacheLookupKey = JSON.stringify({
            mugs: selectedKeys.slice().sort(),
            lat: Number(coords.lat).toFixed(3),
            lon: Number(coords.lon).toFixed(3)
          });
          try {
            const cached = JSON.parse(sessionStorage.getItem(cacheKey) || "null");
            if (cached && cached.key === cacheLookupKey && Array.isArray(cached.names) && cached.names.length) {
              const filteredCachedNames = filterBlockedPlaceNames(cached.names).slice(0, 10);
              const rotatedCachedNames = rotatePlacesForSelection(filteredCachedNames, selectedKeys);
              setPlaceLabels(rotatedCachedNames);
              return;
            }
          } catch (_cacheError) {
            // Ignore malformed cache and recompute.
          }

          const resultGroups = await Promise.all(
            terms.map(function (term) {
              return searchTermNearby(term, coords).catch(function () {
                return [];
              });
            })
          );

          const seen = new Set();
          const merged = [];
          resultGroups.forEach(function (places) {
            places.forEach(function (place) {
              const key = place.name.toLowerCase();
              if (seen.has(key)) return;
              seen.add(key);
              merged.push({
                name: place.name,
                score: scorePlace(place, selectedKeys, coords)
              });
            });
          });

          merged.sort(function (a, b) {
            return b.score - a.score;
          });

          if (merged.length < 10) {
            const supplementalTerms = [];
            selectedKeys.forEach(function (key) {
              const mapped = mugToSearchTerms[key] || [];
              if (mapped[0] && !supplementalTerms.includes(mapped[0])) supplementalTerms.push(mapped[0]);
            });
            if (!supplementalTerms.includes("cafe")) supplementalTerms.push("cafe");

            const supplementalGroups = await Promise.all(
              supplementalTerms.map(function (term) {
                return searchTermNearby(term, coords, { latDelta: 0.15, limit: 20, bounded: false }).catch(function () {
                  return [];
                });
              })
            );

            supplementalGroups.forEach(function (places) {
              places.forEach(function (place) {
                const key = place.name.toLowerCase();
                if (seen.has(key)) return;
                seen.add(key);
                merged.push({
                  name: place.name,
                  score: scorePlace(place, selectedKeys, coords)
                });
              });
            });

            merged.sort(function (a, b) {
              return b.score - a.score;
            });
          }

          if (merged.length || selectedKeys.some(function (k) { return (mugCuratedPlaces[k] || []).length > 0; })) {
            const rankedNames = merged.map(function (item) { return item.name; });
            const curatedNames = [];
            const curatedBuckets = selectedKeys.map(function (key) {
              return (mugCuratedPlaces[key] || []).slice();
            });
            const maxBucketLength = curatedBuckets.reduce(function (max, bucket) {
              return Math.max(max, bucket.length);
            }, 0);
            for (let i = 0; i < maxBucketLength; i += 1) {
              curatedBuckets.forEach(function (bucket) {
                const name = bucket[i];
                if (!name) return;
                if (!curatedNames.includes(name)) curatedNames.push(name);
              });
            }
            const output = [];
            curatedNames.forEach(function (name) {
              if (!output.includes(name)) output.push(name);
            });
            rankedNames.forEach(function (name) {
              if (!output.includes(name)) output.push(name);
            });
            const bestNames = filterBlockedPlaceNames(output).slice(0, 10);
            const rotatedBestNames = rotatePlacesForSelection(bestNames, selectedKeys);
            setPlaceLabels(rotatedBestNames);
            try {
              sessionStorage.setItem(cacheKey, JSON.stringify({ key: cacheLookupKey, names: bestNames }));
            } catch (_cacheWriteErr) {
              // No-op if storage unavailable.
            }
          }
        }

        function getSelectedMugs() {
          const query = new URLSearchParams(window.location.search);
          const mugsParam = query.get("mugs");
          if (mugsParam) {
            return mugsParam
              .split(",")
              .map(function (value) { return value.trim(); })
              .filter(function (value) { return mugMap[value]; });
          }
          try {
            const fromStorage = JSON.parse(sessionStorage.getItem("drinkindexSelectedMugs") || "[]");
            if (Array.isArray(fromStorage)) {
              return fromStorage.filter(function (value) { return mugMap[value]; });
            }
          } catch (_error) {
            // Ignore parse error and fallback.
          }
          const single = query.get("mug");
          if (single && mugMap[single]) return [single];
          return ["blue"];
        }

        const selectedKeys = getSelectedMugs();

        includeLabel.textContent =
          selectedKeys.length > 1
            ? selectedKeys.length + " chosen drinks"
            : mugMap[selectedKeys[0]].label;

        selectedKeys.forEach(function (key) {
          const item = document.createElement("img");
          item.className = "df-selected-mug" + (key === "orange" ? " df-selected-mug--orange" : "");
          item.src = mugMap[key].src;
          item.alt = mugMap[key].label;
          mugWrap.appendChild(item);
        });

        loadDrinkSpecificPlaces(selectedKeys).catch(function () {
          // Keep fallback names if request fails.
        });

        locationModal.addEventListener("click", function (event) {
          if (event.target === locationModal) closeLocationModal();
        });

        for (let i = 0; i < maxVisiblePlaces; i += 1) {
          const trigger = getTriggerNode(i);
          if (!trigger) continue;
          (function (index) {
            trigger.addEventListener("click", function () {
              openLocationModal(currentPlaceNames[index] || "Location");
            });
          })(i);
        }
      })();
    </script>
  </body>
</html>
