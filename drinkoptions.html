            <img

              alt=""

            />
            <img
              class="p3-nav-figma p3-nav-figma--sticker"

            <img

            />
            <img
              class="p3-nav-figma p3-nav-figma--sip-handle"
              src="https://www.figma.com/api/mcp/asset/9143d1b8-5b61-486e-8510-8a57ed2e694c"
              alt=""

            />
            <img

              alt=""

            />
            <img

            />
            <img

            />
            <img
              class="p3-nav-figma p3-nav-figma--profile"

              alt=""
              aria-hidden="true"
            />
            <a
              class="p3-home-hit"
              href="./homepage.html"
              aria-label="Go to home"
              onclick="sessionStorage.setItem('drinkindexSkipSplashOnce','true')"

            <a class="p3-star-hit" href="./stickercollection.html" aria-label="Go to sticker collection"></a>

            <section class="p3-permission-modal" id="p3-permission-modal" role="dialog" aria-modal="true" aria-label="Location permission request">
              <div class="p3-permission-card">
                <header class="p3-permission-header">
                  <h2>Allow “StarSips” to use your location?</h2>
                  <p>Location access is required to find fun drinks near you.</p>
                </header>
                <div class="p3-permission-map"></div>
                <button class="p3-permission-action" id="p3-allow-once" type="button">Allow Once</button>
                <button class="p3-permission-action" id="p3-allow-while-using" type="button">Allow While Using App</button>
                <button class="p3-permission-action" id="p3-dont-allow" type="button">Don’t Allow</button>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const screen = document.getElementById("p3-screen");
        const modal = document.getElementById("p3-permission-modal");
        const mugOptions = Array.from(document.querySelectorAll(".p3-mug-option"));
        const mugPickerGo = document.getElementById("p3-mug-picker-go");
        const allowOnce = document.getElementById("p3-allow-once");
        const allowWhileUsing = document.getElementById("p3-allow-while-using");
        const dontAllow = document.getElementById("p3-dont-allow");
        if (!screen || !modal || !allowOnce || !allowWhileUsing || !dontAllow || !mugPickerGo) return;

        const pendingKey = "drinkLocationPromptPending";
        const coordsKey = "drinkindexCoords";
        const selectedMugsKey = "drinkindexSelectedMugs";
        const shouldShow = sessionStorage.getItem(pendingKey) === "true";

        if (shouldShow) {
          screen.classList.add("is-permission-open");
          modal.hidden = false;
        } else {
          modal.hidden = true;
        }

        function closeModal() {
          screen.classList.remove("is-permission-open");
          modal.hidden = true;
          sessionStorage.removeItem(pendingKey);
        }

        function saveCoords(position) {
          const payload = {
            lat: position.coords.latitude,
            lon: position.coords.longitude,
            capturedAt: Date.now()
          };
          sessionStorage.setItem(coordsKey, JSON.stringify(payload));
        }

        function requestLocationThenClose() {
          if (!("geolocation" in navigator)) {
            closeModal();
            return;
          }
          navigator.geolocation.getCurrentPosition(
            function (position) {
              saveCoords(position);
              closeModal();
            },
            function () {
              closeModal();
            },
            {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 300000
            }
          );
        }

        allowOnce.addEventListener("click", function () {
          requestLocationThenClose();
        });

        allowWhileUsing.addEventListener("click", function () {
          requestLocationThenClose();
        });

        dontAllow.addEventListener("click", function () {
          closeModal();
        });

        const selectedMugs = new Set();

        function syncMugUi() {
          mugOptions.forEach(function (mug) {
            const key = mug.getAttribute("data-mug");
            if (!key) return;
            mug.classList.toggle("is-selected", selectedMugs.has(key));
          });
          mugPickerGo.classList.toggle("is-disabled", selectedMugs.size === 0);
          mugPickerGo.disabled = selectedMugs.size === 0;
        }

        mugOptions.forEach(function (mug) {
          mug.addEventListener("click", function () {
            const mugKey = mug.getAttribute("data-mug");
            if (!mugKey) return;
            if (selectedMugs.has(mugKey)) {
              selectedMugs.delete(mugKey);
            } else {
              selectedMugs.add(mugKey);
            }
            syncMugUi();
          });
        });

        mugPickerGo.addEventListener("click", function () {
          const list = Array.from(selectedMugs);
          if (!list.length) return;
          sessionStorage.setItem(selectedMugsKey, JSON.stringify(list));
          window.location.href = "./drinkfinder.html?mugs=" + encodeURIComponent(list.join(","));
        });

        syncMugUi();
      })();
    </script>
  </body>
</html>
