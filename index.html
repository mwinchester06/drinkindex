        function ensureStickerSelection() {
          if (selectedStickerIds.size) return;
          const defaults = ["blue", "hello", "sleepy"];
          defaults.forEach(function (id) { selectedStickerIds.add(id); });
        }

        function loadSelectedStickers() {
          try {
            const raw = localStorage.getItem(homepageStickerKey);
            const list = raw ? JSON.parse(raw) : [];
            if (Array.isArray(list)) {
              list.forEach(function (id) {
                if (stickerMap[id]) selectedStickerIds.add(id);
              });
            }
          } catch (_error) {
            // Ignore malformed storage entries.
          }
          ensureStickerSelection();
          while (selectedStickerIds.size > maxStickerSelection) {
            const removable = Array.from(selectedStickerIds).pop();
            if (!removable) break;
            selectedStickerIds.delete(removable);
          }
        }

        function saveSelectedStickers() {
          try {
            localStorage.setItem(homepageStickerKey, JSON.stringify(Array.from(selectedStickerIds)));
          } catch (_error) {
            // Ignore storage write failures.
          }
        }

        function renderStickerDisplay() {
          stickerDisplay.innerHTML = "";
          const preferredOrder = ["blue", "hello", "sleepy"];
          const orderedIds = preferredOrder.filter(function (id) { return selectedStickerIds.has(id); });
          orderedIds.slice(0, maxStickerSelection).forEach(function (id, index) {
            const option = stickerMap[id];
            if (!option) return;
            const img = document.createElement("img");
            img.className = "hp-sticker-picked hp-sticker-picked--slot-" + (index + 1);
            img.src = option.src;
            img.alt = option.alt;
            stickerDisplay.appendChild(img);
          });
        }

        function syncPickerUi() {
          const buttons = stickerPickerGrid.querySelectorAll(".hp-sticker-option");
          buttons.forEach(function (button) {
            const id = button.getAttribute("data-sticker-id");
            button.classList.toggle("is-selected", selectedStickerIds.has(id));
          });
          const ready = selectedStickerIds.size === maxStickerSelection;
          stickerPickerGo.classList.toggle("is-disabled", !ready);
          stickerPickerGo.disabled = !ready;
        }

        function buildPickerOptions() {
          stickerPickerGrid.innerHTML = "";
          stickerOptions.forEach(function (option) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "hp-sticker-option hp-sticker-option--" + option.id;
            button.setAttribute("data-sticker-id", option.id);
            button.setAttribute("aria-label", "Choose " + option.alt);
            const img = document.createElement("img");
            img.src = option.src;
            img.alt = "";
            button.appendChild(img);
            button.addEventListener("click", function () {
              const id = option.id;
              if (selectedStickerIds.has(id)) {
                selectedStickerIds.delete(id);
              } else if (selectedStickerIds.size < maxStickerSelection) {
                selectedStickerIds.add(id);
              }
              syncPickerUi();
            });
            stickerPickerGrid.appendChild(button);
          });
          syncPickerUi();
        }

        function openStickerPicker() {
          buildPickerOptions();
          stickerPicker.hidden = false;
          screen.classList.add("is-sticker-picker-open");
        }

        function closeStickerPicker() {
          stickerPicker.hidden = true;
          screen.classList.remove("is-sticker-picker-open");
        }

        function splitNameTwoLines(name) {
          const cleaned = (name || "").trim();
          if (!cleaned) return ["Wild Love", "Bakehouse"];
          if (/^scooter'?s\s+coffee$/i.test(cleaned)) return ["Scooter's Coffee", ""];
          if (/^fable\s+hollow$/i.test(cleaned)) return ["Fable Hollow", ""];
          if (/^fable\s+hollow\s+coffee\s*(?:&|and)\s*bookshoppe$/i.test(cleaned)) {
            return ["Fable Hollow", "Coffee & Bookshoppe"];
          }
          const words = cleaned.split(/\s+/);
          if (words.length <= 1) return [cleaned, ""];
          const midpoint = Math.ceil(words.length / 2);
          return [words.slice(0, midpoint).join(" "), words.slice(midpoint).join(" ")];
        }

        function setTwoLineText(node, value) {
          if (!node) return;
          const lines = splitNameTwoLines(value);
          node.textContent = "";
          node.appendChild(document.createTextNode(lines[0] || ""));
          if (lines[1]) {
            node.appendChild(document.createElement("br"));
            node.appendChild(document.createTextNode(lines[1]));
          }
        }

        function normalizePlaceName(name) {
          return String(name || "")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, " ")
            .trim();
        }

        function buildPlaceMugLookup() {
          const lookup = {};
          Object.keys(mugCuratedPlaces).forEach(function (mugKey) {
            (mugCuratedPlaces[mugKey] || []).forEach(function (placeName) {
              const normalized = normalizePlaceName(placeName);
              if (!normalized) return;
              if (!lookup[normalized]) lookup[normalized] = [];
              if (!lookup[normalized].includes(mugKey)) {
                lookup[normalized].push(mugKey);
              }
            });
          });
          return lookup;
        }

        function getHomepagePlaces() {
          const placeMugLookup = buildPlaceMugLookup();
          const seen = new Set();
          const places = [];
          Object.keys(mugCuratedPlaces).forEach(function (mugKey) {
            (mugCuratedPlaces[mugKey] || []).forEach(function (displayName) {
              const normalized = normalizePlaceName(displayName);
              if (!normalized || seen.has(normalized)) return;
              const photoSrc = homepageUploadedPhotoByPlace[normalized];
              if (!photoSrc) return;
              seen.add(normalized);
              places.push({
                name: displayName,
                photoSrc: photoSrc,
                mugs: (placeMugLookup[normalized] || [mugKey]).slice(0, 5)
              });
            });
          });
          return places;
        }

        function pickRandomPlaces(list, count) {
          const copy = list.slice();
          for (let i = copy.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = copy[i];
            copy[i] = copy[j];
            copy[j] = tmp;
          }
          return copy.slice(0, Math.min(count, copy.length));
        }

        function renderMugTray(targetNode, mugKeys) {
          targetNode.innerHTML = "";
          (mugKeys || []).slice(0, 5).forEach(function (mugKey) {
            const mugSrc = homepageMugMap[mugKey];
            if (!mugSrc) return;
            const img = document.createElement("img");
            if (mugKey === "orange") img.className = "hp-place-mug--orange";
            img.src = mugSrc;
            img.alt = "";
            targetNode.appendChild(img);
          });
        }

        function renderHomepagePlaces() {
          const defaults = [
            { name: "Life House Coffee", photoSrc: "./assets/life-house-coffee.png", mugs: ["pink", "green", "orange"] },
            { name: "Wild Love Bakehouse", photoSrc: "./assets/wild-love-bakehouse.png", mugs: ["pink", "green", "blue"] },
            { name: "Hey Bear Cafe", photoSrc: "./assets/hey-bear-cafe.png", mugs: ["pink", "purple", "orange"] },
            { name: "Mahalo", photoSrc: "./assets/mahalo-coffee-roasters.png", mugs: ["pink", "green"] },
            { name: "Starbucks", photoSrc: "./assets/starbucks.png", mugs: ["pink", "green", "orange"] }
          ];
          const pool = getHomepagePlaces();
          const selected = pickRandomPlaces(pool, 5);
          const places = selected.length === 5 ? selected : defaults;

          popularHeading.textContent = places[0].name;
          popularPhoto.src = places[0].photoSrc;
          const location2 = splitNameTwoLines(places[1].name);
          location2Line1.textContent = location2[0] || "";
          location2Line2.textContent = location2[1] || "";
          location2Photo.src = places[1].photoSrc;
          setTwoLineText(location3Name, places[2].name);
          location3Photo.src = places[2].photoSrc;
          setTwoLineText(location4Text, places[3].name);
          location4Photo.src = places[3].photoSrc;
          setTwoLineText(location5Text, places[4].name);
          location5Photo.src = places[4].photoSrc;

          renderMugTray(placeMugs1, places[0].mugs);
          renderMugTray(placeMugs2, places[1].mugs);
          renderMugTray(placeMugs3, places[2].mugs);
          renderMugTray(placeMugs4, places[3].mugs);
          renderMugTray(placeMugs5, places[4].mugs);
        }

        renderHomepagePlaces();

        loadSelectedStickers();
        renderStickerDisplay();

        stickerEditTrigger.addEventListener("click", openStickerPicker);
        stickerPicker.addEventListener("click", function (event) {
          if (event.target === stickerPicker) closeStickerPicker();
        });
        stickerPickerGo.addEventListener("click", function () {
          if (selectedStickerIds.size !== maxStickerSelection) return;
          saveSelectedStickers();
          renderStickerDisplay();
          closeStickerPicker();
        });
      })();
    </script>
  </body>
</html>
